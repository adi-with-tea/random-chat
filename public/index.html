<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CipherChat — Anonymous & Encrypted</title>
  <script src="/socket.io/socket.io.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #050810;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #00ffcc;
      --accent2: #0088ff;
      --text: #e8eaf0;
      --muted: #555a70;
      --danger: #ff4466;
    }

    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Animated background */
    canvas#bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

    #app { position: relative; z-index: 1; width: 100%; max-width: 680px; padding: 24px 16px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

    /* Header */
    header { text-align: center; margin-bottom: 40px; padding-top: 32px; }
    .logo {
      font-size: 42px; font-weight: 700; letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }
    .tagline { font-size: 13px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
    #online-count {
      margin-top: 12px; display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--muted); background: var(--surface);
      border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px;
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Start screen */
    #start-screen { width: 100%; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      backdrop-filter: blur(20px);
    }
    .card label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 8px; }
    .card input {
      width: 100%; background: rgba(255,255,255,0.03); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; color: var(--text);
      font-family: inherit; font-size: 15px; outline: none; transition: border 0.2s;
      margin-bottom: 20px;
    }
    .card input:focus { border-color: var(--accent); }
    .btn-primary {
      width: 100%; padding: 15px; border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #000; font-family: inherit; font-size: 16px; font-weight: 700;
      cursor: pointer; transition: opacity 0.2s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    #status-msg {
      margin-top: 20px; text-align: center; color: var(--muted); font-size: 14px;
      display: flex; align-items: center; justify-content: center; gap: 10px; min-height: 24px;
    }
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Chat screen */
    #chat-screen { display: none; width: 100%; flex-direction: column; }
    .chat-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0; margin-bottom: 12px;
    }
    .chat-status { display: flex; align-items: center; gap: 8px; font-size: 14px; color: var(--accent); }
    .btn-secondary {
      padding: 8px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-family: inherit; font-size: 13px;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--danger); color: var(--danger); }

    #messages {
      height: 420px; overflow-y: auto; padding: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 16px; display: flex; flex-direction: column; gap: 10px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg { max-width: 72%; padding: 11px 15px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; animation: msgIn 0.2s ease; }
    @keyframes msgIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }
    .msg.you { background: linear-gradient(135deg, #00ffcc22, #0088ff22); border: 1px solid #00ffcc33; align-self: flex-end; border-bottom-right-radius: 4px; }
    .msg.stranger { background: rgba(255,255,255,0.05); border: 1px solid var(--border); align-self: flex-start; border-bottom-left-radius: 4px; }
    .msg.system { background: transparent; color: var(--muted); align-self: center; font-size: 12px; font-style: italic; border: none; text-align: center; }
    .msg-label { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; opacity: 0.5; margin-bottom: 4px; }

    #typing-indicator { height: 20px; font-size: 12px; color: var(--muted); padding: 2px 4px; }

    #input-row { display: flex; gap: 8px; margin-top: 8px; }
    #msg-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 13px 16px; color: var(--text);
      font-family: inherit; font-size: 15px; outline: none; transition: border 0.2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      padding: 13px 22px; background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 12px; color: #000; font-family: inherit;
      font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s;
    }
    #send-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

<canvas id="bg"></canvas>

<div id="app">
  <header>
    <div class="logo">CipherChat</div>
    <div class="tagline">Anonymous · Encrypted · Ephemeral</div>
    <div id="online-count"><span class="dot"></span> <span id="count-num">0</span> online</div>
  </header>

  <!-- Start screen -->
  <div id="start-screen">
    <div class="card">
      <label>Your Interest (optional)</label>
      <input id="tag-input" placeholder="gaming, music, movies..." />
      <button class="btn-primary" onclick="startChat()">Start Chatting</button>
      <div id="status-msg"></div>
    </div>
  </div>

  <!-- Chat screen -->
  <div id="chat-screen">
    <div class="chat-header">
      <div class="chat-status"><span class="dot"></span> <span id="chat-status-text">Connected to a stranger</span></div>
      <button class="btn-secondary" onclick="newChat()">✕ End chat</button>
    </div>
    <div id="messages"></div>
    <div id="typing-indicator"></div>
    <div id="input-row">
      <input id="msg-input" placeholder="Type a message..." onkeydown="handleKey(event)" oninput="handleTyping()" />
      <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<script>
  // Particle background
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  for (let i = 0; i < 60; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: Math.random() * 1.5 + 0.5,
      dx: (Math.random() - 0.5) * 0.3,
      dy: (Math.random() - 0.5) * 0.3,
      o: Math.random() * 0.5 + 0.1
    });
  }

  function drawBg() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
      p.x += p.dx; p.y += p.dy;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,255,200,${p.o})`;
      ctx.fill();
    });
    requestAnimationFrame(drawBg);
  }
  drawBg();

  // Socket
  const socket = io();
  let typingTimeout = null;
  let isTyping = false;

  socket.on('user_count', (count) => {
    document.getElementById('count-num').textContent = count;
  });

  function startChat() {
    const tag = document.getElementById('tag-input').value.trim();
    const statusEl = document.getElementById('status-msg');
    statusEl.innerHTML = '<div class="spinner"></div> Searching...';
    socket.emit('find_match', tag);
  }

  socket.on('waiting', (msg) => {
    document.getElementById('status-msg').innerHTML = `<div class="spinner"></div> ${msg}`;
  });

  socket.on('matched', () => {
    document.getElementById('start-screen').style.display = 'none';
    const chatScreen = document.getElementById('chat-screen');
    chatScreen.style.display = 'flex';
    document.getElementById('messages').innerHTML = '';
    document.getElementById('chat-status-text').textContent = 'Connected to a stranger';
    document.getElementById('chat-status-text').style.color = 'var(--accent)';
    addMessage('system', '🔒 Connected. Say hello!');
    document.getElementById('msg-input').focus();
  });

  function sendMessage() {
    const input = document.getElementById('msg-input');
    const text = input.value.trim();
    if (!text || !socket.connected) return;
    socket.emit('message', text);
    socket.emit('typing', false);
    isTyping = false;
    addMessage('you', text);
    input.value = '';
  }

  socket.on('message', (text) => {
    document.getElementById('typing-indicator').textContent = '';
    addMessage('stranger', text);
  });

  function handleKey(e) { if (e.key === 'Enter') sendMessage(); }

  function handleTyping() {
    if (!isTyping) { isTyping = true; socket.emit('typing', true); }
    clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => { isTyping = false; socket.emit('typing', false); }, 1500);
  }

  socket.on('typing', (active) => {
    document.getElementById('typing-indicator').textContent = active ? 'Stranger is typing...' : '';
  });

  socket.on('partner_left', () => {
    addMessage('system', 'Stranger has disconnected.');
    document.getElementById('chat-status-text').textContent = 'Disconnected';
    document.getElementById('chat-status-text').style.color = 'var(--danger)';
  });

  function addMessage(type, text) {
    const div = document.createElement('div');
    div.className = 'msg ' + type;
    if (type !== 'system') {
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = type === 'you' ? 'You' : 'Stranger';
      div.appendChild(label);
    }
    const content = document.createElement('span');
    content.textContent = text;
    div.appendChild(content);
    const box = document.getElementById('messages');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function newChat() {
    location.reload();
  }
</script>
</body>
</html>
