<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexChat - Secure Anonymous Chat</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- ES Module Shims for Import Maps compatibility -->
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.150.1/build/three.module.js"
        }
      }
    </script>
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    
    <div class="glass-container" id="app-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen active">
            <h1 class="logo">Nex<span>Chat</span></h1>
            <p class="subtitle">Next-Gen E2E Encrypted Anonymous Chat</p>
            <div class="user-count" id="online-count">Live Users Online: 0</div>
            
            <div class="interests-box">
                <!-- Connect with someone who has the same interest tag -->
                <input type="text" id="interest-input" placeholder="Add an interest (optional)">
            </div>
            
            <button id="start-btn" class="glow-btn">Start Chat</button>
        </div>

        <!-- Chat Screen -->
        <div id="chat-screen" class="screen">
            <div class="chat-header">
                <div class="status-indicator">
                    <span class="dot"></span>
                    <span id="chat-status">Searching...</span>
                    <!-- Secured Badge for E2EE context -->
                    <span id="encryption-badge" class="badge hidden">🔒 Encrypted</span>
                </div>
                <button id="next-btn" class="outline-btn">Next</button>
            </div>
            
            <div class="chat-messages" id="chat-box"></div>
            
            <div class="typing-indicator hidden" id="typing-indicator">Stranger is typing<span>.</span><span>.</span><span>.</span></div>
            
            <div class="chat-input-area">
                <input type="text" id="msg-input" placeholder="Type your vibe..." disabled>
                <button id="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="/js/app.js"></script>
</body>
</html>
