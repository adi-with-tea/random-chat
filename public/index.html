<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CipherChat — Anonymous & Encrypted</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg: #060608;
    --surface: rgba(255,255,255,0.04);
    --surface2: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0eeea;
    --text2: #8a8880;
    --accent: #00e5a0;
    --accent2: #0099ff;
    --danger: #ff4466;
    --you-bubble: rgba(0,229,160,0.12);
    --them-bubble: rgba(255,255,255,0.06);
    --you-border: rgba(0,229,160,0.3);
    --them-border: rgba(255,255,255,0.1);
    --delete-bg: rgba(255,68,102,0.08);
    --delete-border: rgba(255,68,102,0.2);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    cursor: default;
  }

  #canvas3d {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .screen {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.5s, transform 0.5s;
  }
  .screen.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(0.97);
  }

  #start-screen {
    flex-direction: column;
    gap: 0;
    text-align: center;
  }

  .brand {
    font-family: 'Syne', sans-serif;
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -2px;
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .tagline {
    font-size: 15px;
    color: var(--text2);
    letter-spacing: 0.5px;
    margin-bottom: 48px;
  }

  .glass-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 40px;
    backdrop-filter: blur(20px);
    width: 380px;
    box-shadow: 0 8px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
  }

  .interest-label {
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 10px;
    text-align: left;
  }

  .interest-input {
    width: 100%;
    padding: 13px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    margin-bottom: 16px;
  }
  .interest-input:focus {
    border-color: rgba(0,229,160,0.4);
    box-shadow: 0 0 0 3px rgba(0,229,160,0.08);
  }
  .interest-input::placeholder { color: var(--text2); }

  .start-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    color: #000;
    font-size: 15px;
    font-weight: 600;
    font-family: 'Syne', sans-serif;
    letter-spacing: 0.3px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 4px 24px rgba(0,229,160,0.25);
  }
  .start-btn:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 8px 32px rgba(0,229,160,0.35); }
  .start-btn:active { transform: translateY(0); }

  #status-msg {
    margin-top: 20px;
    font-size: 13px;
    color: var(--text2);
    min-height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .dot-pulse {
    display: inline-flex;
    gap: 4px;
  }
  .dot-pulse span {
    width: 5px; height: 5px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }
  .dot-pulse span:nth-child(2) { animation-delay: 0.2s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse {
    0%,80%,100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .online-pill {
    position: fixed;
    top: 20px;
    right: 20px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--text2);
    backdrop-filter: blur(10px);
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .online-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: blink 2s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  #chat-screen {
    flex-direction: column;
    padding: 0;
  }

  .chat-wrap {
    width: 100%;
    max-width: 740px;
    height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 12px;
  }

  .chat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(20px);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .conn-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: blink 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  .conn-indicator.disconnected {
    background: var(--danger);
    box-shadow: 0 0 8px var(--danger);
    animation: none;
  }

  .conn-text {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
  }

  .enc-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(0,229,160,0.1);
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.5px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .icon-btn {
    padding: 8px 16px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text2);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.3px;
  }
  .icon-btn:hover { border-color: var(--border2); color: var(--text); }
  .icon-btn.danger:hover { border-color: rgba(255,68,102,0.4); color: var(--danger); }

  #messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.1) transparent;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

  .msg-row {
    display: flex;
    flex-direction: column;
    animation: msgIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes msgIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .msg-row.you { align-items: flex-end; }
  .msg-row.them { align-items: flex-start; }
  .msg-row.system { align-items: center; }

  .bubble {
    max-width: 72%;
    padding: 11px 16px;
    border-radius: 14px;
    font-size: 14px;
    line-height: 1.55;
    position: relative;
    word-break: break-word;
  }

  .msg-row.you .bubble {
    background: var(--you-bubble);
    border: 1px solid var(--you-border);
    border-bottom-right-radius: 4px;
  }
  .msg-row.them .bubble {
    background: var(--them-bubble);
    border: 1px solid var(--them-border);
    border-bottom-left-radius: 4px;
  }

  .bubble.deleted {
    background: var(--delete-bg) !important;
    border-color: var(--delete-border) !important;
    color: var(--text2) !important;
    font-style: italic;
    font-size: 13px;
  }

  .msg-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 11px;
    color: var(--text2);
  }

  .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
    margin-left: 4px;
  }
  .msg-row:hover .delete-btn { opacity: 1; }
  .delete-btn:hover { color: var(--danger); background: rgba(255,68,102,0.1); }

  .system-msg {
    font-size: 12px;
    color: var(--text2);
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-style: italic;
  }

  #typing-bar {
    height: 20px;
    font-size: 12px;
    color: var(--text2);
    padding: 0 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .input-area {
    display: flex;
    gap: 10px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 14px;
    backdrop-filter: blur(20px);
    flex-shrink: 0;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
    font-family: 'DM Sans', sans-serif;
    resize: none;
    max-height: 120px;
    min-height: 22px;
    line-height: 1.55;
    overflow-y: auto;
    scrollbar-width: none;
  }
  #msg-input::placeholder { color: var(--text2); }

  .send-btn {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,229,160,0.2);
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(0,229,160,0.35); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn svg { width: 16px; height: 16px; fill: #000; }

  .particle {
    position: fixed;
    pointer-events: none;
    border-radius: 50%;
    animation: particleFly 0.6s ease-out forwards;
    z-index: 9999;
  }
  @keyframes particleFly {
    to { transform: translate(var(--tx), var(--ty)) scale(0); opacity: 0; }
  }

  #enc-overlay {
    position: fixed;
    inset: 0;
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(6,6,8,0.85);
    backdrop-filter: blur(10px);
    gap: 16px;
    transition: opacity 0.4s;
  }
  #enc-overlay.hidden { opacity: 0; pointer-events: none; }

  .enc-spinner {
    width: 48px; height: 48px;
    border: 2px solid rgba(0,229,160,0.2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .enc-text {
    font-size: 14px;
    color: var(--text2);
    letter-spacing: 0.3px;
  }

  .ticks { color: var(--text2); font-size: 11px; }
  .ticks.read { color: var(--accent); }

  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255
